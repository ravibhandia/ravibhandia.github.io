  I enjoy leveraging AI collaboratively to create products that promote a more sustainable world. At PepsiCo, I leveraged data to execute on LSS projects, while proving myself as a leader and directly supervising over 60 employees. At Pepsi, as well as in my experience in venture capital, I thrived while working in heavily cross-functional teams using data to make informed decisions and prioritize tasks. While at two Silicon Valley startups with now successfully launched products, I excelled in translating and communicating stakeholder requirements to engineers and technicians. To further develop these skills, I am pursuing a master’s degree in operations research with an emphasis in machine learning at the UC Berkeley Fung Institute of Engineering Leadership, where my capstone team is currently building a machine-learning based data visualization platform for Ripple. I am pursuing roles in product management and data science and will be graduating in May 2020. 
